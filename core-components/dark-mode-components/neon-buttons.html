<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Buttons | TailGrids</title>
    <link
      rel="shortcut icon"
      href="../../assets/images/favicon.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../../assets/css/tailwind.css" />
  </head>
  <body class="bg-dark">
    <!-- ====== Neon Buttons Section Start -->
    <section class="pb-10 pt-20 lg:pb-20 lg:pt-[120px] dark:bg-dark">
      <div class="container mx-auto">
        <div class="-mx-4 flex flex-wrap justify-center">
          <div class="w-full px-4">
            <div class="mb-5 flex flex-wrap items-center justify-center gap-5">
              <!-- Primary Neon Button -->
              <a
                href="javascript:void(0)"
                class="inline-flex items-center justify-center rounded-md border border-primary bg-primary px-7 py-3 text-center text-base font-medium text-white shadow-[0_0_20px_rgba(59,130,246,0.5)] hover:shadow-[0_0_30px_rgba(59,130,246,0.7)] active:shadow-[0_0_15px_rgba(59,130,246,0.5)] transition-all duration-300"
              >
                Primary Neon
              </a>
              
              <!-- Secondary Neon Button -->
              <a
                href="javascript:void(0)"
                class="inline-flex items-center justify-center rounded-md border border-secondary bg-secondary px-7 py-3 text-center text-base font-medium text-white shadow-[0_0_20px_rgba(16,185,129,0.5)] hover:shadow-[0_0_30px_rgba(16,185,129,0.7)] active:shadow-[0_0_15px_rgba(16,185,129,0.5)] transition-all duration-300"
              >
                Secondary Neon
              </a>
              
              <!-- Accent Neon Button -->
              <a
                href="javascript:void(0)"
                class="inline-flex items-center justify-center rounded-md border border-accent bg-accent px-7 py-3 text-center text-base font-medium text-white shadow-[0_0_20px_rgba(245,158,11,0.5)] hover:shadow-[0_0_30px_rgba(245,158,11,0.7)] active:shadow-[0_0_15px_rgba(245,158,11,0.5)] transition-all duration-300"
              >
                Accent Neon
              </a>
              
              <!-- Purple Neon Button -->
              <a
                href="javascript:void(0)"
                class="inline-flex items-center justify-center rounded-md border border-purple-500 bg-purple-500 px-7 py-3 text-center text-base font-medium text-white shadow-[0_0_20px_rgba(168,85,247,0.5)] hover:shadow-[0_0_30px_rgba(168,85,247,0.7)] active:shadow-[0_0_15px_rgba(168,85,247,0.5)] transition-all duration-300"
              >
                Purple Neon
              </a>
              
              <!-- Blue Neon Button -->
              <a
                href="javascript:void(0)"
                class="inline-flex items-center justify-center rounded-md border border-blue-400 bg-blue-400 px-7 py-3 text-center text-base font-medium text-white shadow-[0_0_20px_rgba(96,165,250,0.5)] hover:shadow-[0_0_30px_rgba(96,165,250,0.7)] active:shadow-[0_0_15px_rgba(96,165,250,0.5)] transition-all duration-300"
              >
                Blue Neon
              </a>
            </div>
            
            <div class="mb-5 flex flex-wrap items-center justify-center gap-5">
              <!-- Outline Primary Neon Button -->
              <a
                href="javascript:void(0)"
                class="inline-flex items-center justify-center rounded-md border border-primary bg-transparent px-7 py-3 text-center text-base font-medium text-primary shadow-[0_0_20px_rgba(59,130,246,0.5)] hover:shadow-[0_0_30px_rgba(59,130,246,0.7)] hover:bg-primary hover:text-white transition-all duration-300"
              >
                Outline Primary
              </a>
              
              <!-- Outline Secondary Neon Button -->
              <a
                href="javascript:void(0)"
                class="inline-flex items-center justify-center rounded-md border border-secondary bg-transparent px-7 py-3 text-center text-base font-medium text-secondary shadow-[0_0_20px_rgba(16,185,129,0.5)] hover:shadow-[0_0_30px_rgba(16,185,129,0.7)] hover:bg-secondary hover:text-white transition-all duration-300"
              >
                Outline Secondary
              </a>
              
              <!-- Outline Accent Neon Button -->
              <a
                href="javascript:void(0)"
                class="inline-flex items-center justify-center rounded-md border border-accent bg-transparent px-7 py-3 text-center text-base font-medium text-accent shadow-[0_0_20px_rgba(245,158,11,0.5)] hover:shadow-[0_0_30px_rgba(245,158,11,0.7)] hover:bg-accent hover:text-white transition-all duration-300"
              >
                Outline Accent
              </a>
            </div>
            
            <div class="mb-5 flex flex-wrap items-center justify-center gap-5">
              <!-- Round Primary Neon Button -->
              <a
                href="javascript:void(0)"
                class="inline-flex items-center justify-center rounded-full border border-primary bg-primary px-7 py-3 text-center text-base font-medium text-white shadow-[0_0_20px_rgba(59,130,246,0.5)] hover:shadow-[0_0_30px_rgba(59,130,246,0.7)] active:shadow-[0_0_15px_rgba(59,130,246,0.5)] transition-all duration-300"
              >
                Round Primary
              </a>
              
              <!-- Round Secondary Neon Button -->
              <a
                href="javascript:void(0)"
                class="inline-flex items-center justify-center rounded-full border border-secondary bg-secondary px-7 py-3 text-center text-base font-medium text-white shadow-[0_0_20px_rgba(16,185,129,0.5)] hover:shadow-[0_0_30px_rgba(16,185,129,0.7)] active:shadow-[0_0_15px_rgba(16,185,129,0.5)] transition-all duration-300"
              >
                Round Secondary
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- ====== Neon Buttons Section End -->
  </body>
</html>
